<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visa Bulletin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 2rem;
        color: #111827;
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr minmax(280px, 360px);
        gap: 1.5rem;
        align-items: start;
      }
      .filters {
        border: 1px solid #d1d5db;
        border-radius: 0.75rem;
        padding: 1rem;
        background: #f9fafb;
        position: sticky;
        top: 1rem;
      }
      fieldset {
        border: 0;
        padding: 0;
        margin: 0 0 1rem;
      }
      legend {
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      label {
        display: block;
        margin: 0.25rem 0;
      }
      button {
        margin: 0.15rem 0.25rem 0.5rem 0;
        padding: 0.35rem 0.55rem;
        border: 1px solid #9ca3af;
        border-radius: 0.4rem;
        background: white;
        cursor: pointer;
      }
      .chart-wrap {
        height: 560px;
        margin-bottom: 2rem;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        font-size: 0.86rem;
      }
      th, td {
        border: 1px solid #d1d5db;
        padding: 0.45rem;
        text-align: left;
      }
      th {
        background: #f3f4f6;
        position: sticky;
        top: 0;
      }
      .note, .count {
        color: #4b5563;
      }
      .errors {
        color: #991b1b;
      }
      .table-wrap {
        max-height: 650px;
        overflow: auto;
        border: 1px solid #d1d5db;
      }
      @media (max-width: 850px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .filters {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="title">Visa Bulletin Dashboard</h1>
    <p id="rangeText" class="note" data-i18n="loading">
      Loading cached bulletin data…
    </p>
    <p class="note" data-i18n="note">
      C = Current, U = Unavailable. Chart lines are created for each selected
      visa category and country.
    </p>
    <section id="errors" class="errors"></section>

    <div class="layout">
      <main>
        <div class="chart-wrap"><canvas id="visaChart"></canvas></div>
        <h2 data-i18n="filteredData">Filtered data</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="tableBulletin">Bulletin</th>
                <th data-i18n="tableGroup">Group</th>
                <th data-i18n="tableCategory">Category</th>
                <th data-i18n="tableCountry">Country</th>
                <th data-i18n="tableCutoff">Cutoff</th>
              </tr>
            </thead>
            <tbody id="dataRows"></tbody>
          </table>
        </div>
      </main>

      <aside class="filters">
        <fieldset>
          <legend data-i18n="language">Language</legend>
          <label><span data-i18n="languageLabel">Language</span> <select
              id="languageSelect"
            >
              <option value="en">English</option>
              <option value="vi">Tiếng Việt</option>
            </select></label>
        </fieldset>
        <fieldset>
          <legend data-i18n="monthRange">Month range</legend>
          <label><span data-i18n="start">Start</span> <select
              id="startBulletin"
            >
            </select></label>
          <label><span data-i18n="end">End</span> <select id="endBulletin">
            </select></label>
        </fieldset>
        <fieldset>
          <legend data-i18n="visaCategories">Visa categories</legend>
          <button
            type="button"
            data-select="category"
            data-value="all"
            data-i18n="all"
          >
            All
          </button>
          <button
            type="button"
            data-select="category"
            data-value="none"
            data-i18n="none"
          >
            None
          </button>
          <div id="categoryFilters"></div>
        </fieldset>
        <fieldset>
          <legend data-i18n="countries">Countries / chargeability</legend>
          <button
            type="button"
            data-select="country"
            data-value="all"
            data-i18n="all"
          >
            All
          </button>
          <button
            type="button"
            data-select="country"
            data-value="none"
            data-i18n="none"
          >
            None
          </button>
          <div id="countryFilters"></div>
        </fieldset>
        <p class="count" id="selectionCount"></p>
      </aside>
    </div>

    <script>
      const AREA_ORDER = [
        "all_chargeability",
        "china",
        "india",
        "mexico",
        "philippines",
      ];
      const TRANSLATIONS = {
        en: {
          title: "Visa Bulletin Dashboard",
          loading: "Loading cached bulletin data…",
          note:
            "C = Current, U = Unavailable. Chart lines are created for each selected visa category and country.",
          filteredData: "Filtered data",
          tableBulletin: "Bulletin",
          tableGroup: "Group",
          tableCategory: "Category",
          tableCountry: "Country",
          tableCutoff: "Cutoff",
          language: "Language",
          languageLabel: "Language",
          monthRange: "Month range",
          start: "Start",
          end: "End",
          visaCategories: "Visa categories",
          countries: "Countries / chargeability",
          all: "All",
          none: "None",
          chartTitle: "Visa Bulletin Final Action Date Movement",
          yAxis: "Priority date cutoff",
          xAxis: "Visa Bulletin month",
          rowsSelected: "{rows} rows, {lines} chart lines selected.",
          cachedRange:
            "Cached range: {start} through {end}. Generated {generated}.",
          loadErrorTitle: "Unable to load data",
          loadErrorHelp:
            "Run the data fetch task and serve this dashboard over HTTP.",
          family: "family",
          employment: "employment",
          unknown: "unknown",
        },
        vi: {
          title: "Bảng theo dõi Lịch chiếu khán",
          loading: "Đang tải dữ liệu đã lưu…",
          note:
            "C = Đang hiệu lực, U = Không khả dụng. Mỗi đường biểu đồ tương ứng với diện visa và quốc gia đã chọn.",
          filteredData: "Dữ liệu đã lọc",
          tableBulletin: "Lịch chiếu khán",
          tableGroup: "Nhóm",
          tableCategory: "Diện visa",
          tableCountry: "Quốc gia",
          tableCutoff: "Ngày ưu tiên",
          language: "Ngôn ngữ",
          languageLabel: "Ngôn ngữ",
          monthRange: "Khoảng tháng",
          start: "Bắt đầu",
          end: "Kết thúc",
          visaCategories: "Diện visa",
          countries: "Quốc gia / khu vực tính visa",
          all: "Tất cả",
          none: "Bỏ chọn",
          chartTitle: "Diễn biến ngày ưu tiên trong Lịch chiếu khán",
          yAxis: "Ngày ưu tiên",
          xAxis: "Tháng của Lịch chiếu khán",
          rowsSelected: "Đã chọn {rows} dòng, {lines} đường biểu đồ.",
          cachedRange:
            "Dữ liệu đã lưu: từ {start} đến {end}. Cập nhật {generated}.",
          loadErrorTitle: "Không thể tải dữ liệu",
          loadErrorHelp:
            "Hãy chạy tác vụ tải dữ liệu và mở dashboard qua HTTP.",
          family: "gia đình",
          employment: "việc làm",
          unknown: "không rõ",
        },
      };
      const AREA_LABELS = {
        en: {
          all_chargeability: "All Chargeability Areas Except Those Listed",
          china: "China-mainland born",
          india: "India",
          mexico: "Mexico",
          philippines: "Philippines",
        },
        vi: {
          all_chargeability:
            "Tất cả khu vực tính visa trừ các khu vực được liệt kê",
          china: "Trung Quốc đại lục",
          india: "Ấn Độ",
          mexico: "Mexico",
          philippines: "Philippines",
        },
      };
      const AREA_SHORT_LABELS = {
        en: {
          all_chargeability: "All",
          china: "China",
          india: "India",
          mexico: "Mexico",
          philippines: "Philippines",
        },
        vi: {
          all_chargeability: "Tất cả",
          china: "Trung Quốc",
          india: "Ấn Độ",
          mexico: "Mexico",
          philippines: "Philippines",
        },
      };
      const MONTH_LABELS = {
        en: [
          "",
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ],
        vi: [
          "",
          "Tháng 1",
          "Tháng 2",
          "Tháng 3",
          "Tháng 4",
          "Tháng 5",
          "Tháng 6",
          "Tháng 7",
          "Tháng 8",
          "Tháng 9",
          "Tháng 10",
          "Tháng 11",
          "Tháng 12",
        ],
      };
      const MONTH_ABBR = {
        JAN: 1,
        FEB: 2,
        MAR: 3,
        APR: 4,
        MAY: 5,
        JUN: 6,
        JUL: 7,
        AUG: 8,
        SEP: 9,
        OCT: 10,
        NOV: 11,
        DEC: 12,
      };
      const colors = [
        "#2563eb",
        "#16a34a",
        "#9333ea",
        "#dc2626",
        "#ea580c",
        "#0891b2",
        "#4f46e5",
        "#be123c",
        "#0f766e",
        "#a16207",
        "#7c3aed",
        "#15803d",
      ];
      let allRows = [];
      let bulletins = [];
      let currentLanguage = localStorage.getItem("language") || "en";
      const FILTER_STATE_KEY = "visaBulletinFilterState";

      function t(key, params = {}) {
        let value = TRANSLATIONS[currentLanguage][key] ||
          TRANSLATIONS.en[key] || key;
        for (const [param, replacement] of Object.entries(params)) {
          value = value.replaceAll("{" + param + "}", replacement);
        }
        return value;
      }

      function localizedBulletinLabel(bulletin) {
        const [year, month] = bulletin.key.split("-").map(Number);
        return (MONTH_LABELS[currentLanguage][month] ||
          MONTH_LABELS.en[month]) + " " + year;
      }

      function setText(id, text) {
        const element = document.getElementById(id);
        if (element) element.textContent = text;
      }

      function applyLanguage() {
        document.documentElement.lang = currentLanguage;
        document.title = t("title");
        document.querySelectorAll("[data-i18n]").forEach((element) => {
          element.textContent = t(element.dataset.i18n);
        });
        document.querySelectorAll("#startBulletin option, #endBulletin option")
          .forEach((option) => {
            const bulletin = bulletins.find((item) =>
              item.key === option.value
            );
            if (bulletin) option.textContent = localizedBulletinLabel(bulletin);
          });
        chart.options.plugins.title.text = t("chartTitle");
        chart.options.scales.y.title.text = t("yAxis");
        chart.options.scales.x.title.text = t("xAxis");
        document.querySelectorAll(".country-filter").forEach((input) => {
          if (input.parentElement?.lastChild) {
            input.parentElement.lastChild.textContent = " " +
              (AREA_SHORT_LABELS[currentLanguage][input.value] || input.value);
          }
        });
        updateRangeText();
        update();
      }

      function categorySortKey(category) {
        return ({
          F1: "A01",
          F2A: "A02",
          F2B: "A03",
          F3: "A04",
          F4: "A05",
          "EB-1": "B01",
          "EB-2": "B02",
          "EB-3": "B03",
          "EB-3 Other Workers": "B04",
          "EB-4": "B05",
          "EB-4 Certain Religious Workers": "B06",
          "EB-5 Unreserved": "B07",
          "EB-5 Set Aside Rural": "B08",
          "EB-5 Set Aside High Unemployment": "B09",
          "EB-5 Set Aside Infrastructure": "B10",
        })[category] || "Z" + category;
      }

      function ordinalToIso(value) {
        if (value === null || value === undefined) return "";
        const epochOrdinal = 719163;
        return new Date((value - epochOrdinal) * 86400000).toISOString().slice(
          0,
          10,
        );
      }

      function parseCutoff(value) {
        const clean = String(value || "").trim().toUpperCase();
        if (clean === "C" || clean === "CURRENT") {
          return { raw: value, kind: "current", iso: null, ordinal: null };
        }
        if (clean === "U" || clean === "UNAVAILABLE") {
          return { raw: value, kind: "unavailable", iso: null, ordinal: null };
        }
        const match = clean.replace(/[^A-Z0-9]/g, "").match(
          /^(\d{1,2})([A-Z]{3})(\d{2})$/,
        );
        if (!match || MONTH_ABBR[match[2]] === undefined) {
          return { raw: value, kind: "unknown", iso: null, ordinal: null };
        }
        const day = Number(match[1]);
        const month = MONTH_ABBR[match[2]];
        const yy = Number(match[3]);
        const year = yy < 50 ? 2000 + yy : 1900 + yy;
        const date = new Date(Date.UTC(year, month - 1, day));
        if (
          date.getUTCFullYear() !== year || date.getUTCMonth() !== month - 1 ||
          date.getUTCDate() !== day
        ) return { raw: value, kind: "unknown", iso: null, ordinal: null };
        const iso = date.toISOString().slice(0, 10);
        return {
          raw: value,
          kind: "date",
          iso,
          ordinal: Math.floor(date.getTime() / 86400000) + 719163,
        };
      }

      async function fetchFirst(paths) {
        const failures = [];
        for (const path of paths) {
          try {
            const response = await fetch(path);
            if (response.ok) return await response.json();
            failures.push(path + " -> " + response.status);
          } catch (error) {
            failures.push(path + " -> " + error.message);
          }
        }
        throw new Error(failures.join("; "));
      }

      async function loadManifest() {
        return await fetchFirst([
          "data/manifest.json",
          "/data/manifest.json",
        ]);
      }

      async function loadMonth(path) {
        return await fetchFirst([
          "data/" + path,
          "/data/" + path,
        ]);
      }

      function rowsFromMonth(cache) {
        return cache.rows.flatMap((row) =>
          AREA_ORDER.map((country) => ({
            bulletinMonth: cache.bulletinMonth,
            bulletinYear: cache.bulletinYear,
            bulletinLabel: cache.bulletinLabel,
            bulletinKey: cache.bulletinKey,
            url: cache.url,
            group: row.group,
            category: row.category,
            country,
            countryLabel: country,
            cutoff: parseCutoff(row.areas[country]),
          }))
        );
      }

      function makeCheckbox(containerId, className, value, label, checked) {
        const container = document.getElementById(containerId);
        const id = className + "-" + value.replace(/[^a-z0-9]+/gi, "-");
        const wrapper = document.createElement("label");
        wrapper.dataset.value = value;
        wrapper.innerHTML = '<input type="checkbox" class="' + className +
          '" id="' + id + '" value="' + value.replace(/"/g, "&quot;") + '"' +
          (checked ? " checked" : "") + "> " + label;
        container.appendChild(wrapper);
      }

      function makeOption(selectId, value, label, selected) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        option.selected = selected;
        document.getElementById(selectId).appendChild(option);
      }

      function selectedValues(className) {
        return new Set(
          [...document.querySelectorAll("." + className + ":checked")].map(
            (input) => input.value,
          ),
        );
      }

      function selectedBulletins() {
        const startKey = document.getElementById("startBulletin").value;
        const endKey = document.getElementById("endBulletin").value;
        const minKey = startKey <= endKey ? startKey : endKey;
        const maxKey = startKey <= endKey ? endKey : startKey;
        return bulletins.filter((bulletin) =>
          bulletin.key >= minKey && bulletin.key <= maxKey
        );
      }

      function filteredRows() {
        const selectedCategories = selectedValues("category-filter");
        const selectedCountries = selectedValues("country-filter");
        const selectedBulletinKeys = new Set(
          selectedBulletins().map((bulletin) => bulletin.key),
        );
        return allRows.filter((row) =>
          selectedCategories.has(row.category) &&
          selectedCountries.has(row.country) &&
          selectedBulletinKeys.has(row.bulletinKey)
        );
      }

      function setSelectValueIfPresent(selectId, value) {
        const select = document.getElementById(selectId);
        if ([...select.options].some((option) => option.value === value)) {
          select.value = value;
        }
      }

      function applyCheckboxValues(className, values) {
        if (!Array.isArray(values)) return;
        const selected = new Set(values);
        document.querySelectorAll("." + className).forEach((input) => {
          input.checked = selected.has(input.value);
        });
      }

      function saveFilterState() {
        const state = {
          start: document.getElementById("startBulletin").value,
          end: document.getElementById("endBulletin").value,
          categories: [...selectedValues("category-filter")],
          countries: [...selectedValues("country-filter")],
        };
        localStorage.setItem(FILTER_STATE_KEY, JSON.stringify(state));
      }

      function restoreFilterState() {
        const raw = localStorage.getItem(FILTER_STATE_KEY);
        if (!raw) return;
        try {
          const state = JSON.parse(raw);
          if (typeof state.start === "string") {
            setSelectValueIfPresent("startBulletin", state.start);
          }
          if (typeof state.end === "string") {
            setSelectValueIfPresent("endBulletin", state.end);
          }
          applyCheckboxValues("category-filter", state.categories);
          applyCheckboxValues("country-filter", state.countries);
        } catch {
          localStorage.removeItem(FILTER_STATE_KEY);
        }
      }

      const chart = new Chart(document.getElementById("visaChart"), {
        type: "line",
        data: { labels: [], datasets: [] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 0 },
          interaction: { mode: "index", intersect: false },
          plugins: {
            title: {
              display: true,
              text: t("chartTitle"),
            },
            tooltip: {
              callbacks: {
                label: (ctx) =>
                  ctx.dataset.label + ": " + ordinalToIso(ctx.parsed.y),
              },
            },
          },
          scales: {
            y: {
              ticks: { callback: (value) => ordinalToIso(value) },
              title: { display: true, text: t("yAxis") },
            },
            x: { title: { display: true, text: t("xAxis") } },
          },
        },
      });

      function updateRangeText(manifest) {
        const activeManifest = manifest || window.visaManifest;
        if (!activeManifest || bulletins.length === 0) return;
        setText(
          "rangeText",
          t("cachedRange", {
            start: localizedBulletinLabel(bulletins[0]),
            end: localizedBulletinLabel(bulletins[bulletins.length - 1]),
            generated: new Date(activeManifest.generatedAt).toLocaleString(
              currentLanguage === "vi" ? "vi-VN" : undefined,
            ),
          }),
        );
      }

      function update() {
        saveFilterState();
        const activeBulletins = selectedBulletins();
        const rows = filteredRows();
        const seriesKeys = [
          ...new Set(rows.map((row) => row.category + "|" + row.country)),
        ].sort();
        chart.data.labels = activeBulletins.map(localizedBulletinLabel);
        chart.data.datasets = seriesKeys.map((seriesKey, index) => {
          const [category, country] = seriesKey.split("|");
          const pointsByBulletin = new Map(
            rows.filter((row) =>
              row.category === category && row.country === country
            ).map((row) => [row.bulletinKey, row.cutoff.ordinal]),
          );
          return {
            label: category + " / " +
              (AREA_SHORT_LABELS[currentLanguage][country] || country),
            data: activeBulletins.map((bulletin) =>
              pointsByBulletin.get(bulletin.key) ?? null
            ),
            borderColor: colors[index % colors.length],
            backgroundColor: colors[index % colors.length],
            spanGaps: true,
            tension: 0.15,
          };
        });
        chart.update();
        document.getElementById("selectionCount").textContent = t(
          "rowsSelected",
          {
            rows: String(rows.length),
            lines: String(seriesKeys.length),
          },
        );
        document.getElementById("dataRows").innerHTML = rows.map((row) =>
          '<tr><td><a href="' + row.url + '">' +
          localizedBulletinLabel({ key: row.bulletinKey }) +
          "</a></td><td>" + t(row.group) + "</td><td>" + row.category +
          "</td><td>" + AREA_LABELS[currentLanguage][row.country] +
          "</td><td>" +
          (row.cutoff.iso || row.cutoff.raw) + "</td></tr>"
        ).join("");
      }

      async function init() {
        try {
          const manifest = await loadManifest();
          window.visaManifest = manifest;
          bulletins = manifest.months;
          const monthCaches = await Promise.all(
            bulletins.map((month) => loadMonth(month.path)),
          );
          allRows = monthCaches.flatMap(rowsFromMonth);
          document.getElementById("languageSelect").value = currentLanguage;
          updateRangeText(manifest);
          bulletins.forEach((bulletin, index) => {
            makeOption(
              "startBulletin",
              bulletin.key,
              localizedBulletinLabel(bulletin),
              index === 0,
            );
            makeOption(
              "endBulletin",
              bulletin.key,
              localizedBulletinLabel(bulletin),
              index === bulletins.length - 1,
            );
          });
          [...new Set(allRows.map((row) => row.category))].sort((a, b) =>
            categorySortKey(a).localeCompare(categorySortKey(b))
          ).forEach((category) =>
            makeCheckbox(
              "categoryFilters",
              "category-filter",
              category,
              category,
              category === "F2B",
            )
          );
          AREA_ORDER.forEach((country) =>
            makeCheckbox(
              "countryFilters",
              "country-filter",
              country,
              AREA_SHORT_LABELS[currentLanguage][country] || country,
              true,
            )
          );
          restoreFilterState();
          document.querySelectorAll(
            'input[type="checkbox"], #startBulletin, #endBulletin',
          ).forEach(
            (input) => input.addEventListener("change", update),
          );
          document.getElementById("languageSelect").addEventListener(
            "change",
            (event) => {
              currentLanguage = event.target.value;
              localStorage.setItem("language", currentLanguage);
              applyLanguage();
            },
          );
          document.querySelectorAll("button[data-select]").forEach((button) =>
            button.addEventListener("click", () => {
              const className = button.dataset.select === "category"
                ? "category-filter"
                : "country-filter";
              const checked = button.dataset.value === "all";
              document.querySelectorAll("." + className).forEach((input) => {
                input.checked = checked;
              });
              update();
            })
          );
          applyLanguage();
        } catch (error) {
          document.getElementById("errors").innerHTML = "<h2>" +
            t("loadErrorTitle") + "</h2><p>" + error.message +
            "</p><p>" + t("loadErrorHelp") + "</p>";
        }
      }

      init();
    </script>
  </body>
</html>
