name: Monthly Visa Bulletin Data Fetch

on:
  schedule:
    # Run monthly on the 2nd at 09:00 UTC, after the month has started.
    - cron: "0 9 2 * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check
        run: deno task check

      - name: Lint
        run: deno task lint

      - name: Fetch monthly data
        run: deno task fetch

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site/data
          cp index.html site/index.html
          cp data/*.json site/data/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
