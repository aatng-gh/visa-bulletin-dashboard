name: Monthly Visa Bulletin Data Fetch

on:
  schedule:
    # Run monthly on the 2nd at 09:00 UTC, after the month has started.
    - cron: "0 9 2 * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Install Nub
        run: curl -fsSL https://nubjs.com/install.sh | bash

      - name: Add Nub to PATH
        run: echo "$HOME/.nub/bin" >> "$GITHUB_PATH"

      - name: Restore generated data
        uses: actions/cache@v4
        with:
          path: data
          key: visa-bulletin-data-${{ github.run_id }}
          restore-keys: |
            visa-bulletin-data-

      - name: Install dependencies
        run: nub install --frozen-lockfile

      - name: Check
        run: nub run check

      - name: Fetch monthly data
        run: nub run data

      - name: Build dashboard
        run: nub run build

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site/data
          cp -R dist/. site/
          cp data/*.json site/data/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
