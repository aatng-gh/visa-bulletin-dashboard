<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#2563eb"/>
  
  <!-- Simple ascending chart lines representing data / priority dates -->
  <path 
    d="M7 23 L11 17 L15 19 L19 12 L25 8" 
    stroke="white" 
    stroke-width="2.75" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
  />
  
  <!-- Subtle dots on the line for data points -->
  <circle cx="7" cy="23" r="1.3" fill="white"/>
  <circle cx="11" cy="17" r="1.3" fill="white"/>
  <circle cx="15" cy="19" r="1.3" fill="white"/>
  <circle cx="19" cy="12" r="1.3" fill="white"/>
  <circle cx="25" cy="8" r="1.3" fill="white"/>
</svg>
